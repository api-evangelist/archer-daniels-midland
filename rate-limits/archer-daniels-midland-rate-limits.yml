description: Archer Daniels Midland does not publish concrete rate-limit numbers, throttling thresholds,
  or response-header conventions. This artifact records the gap; see notes for research findings.
notes: No public rate-limit documentation. Throughput is governed by individual partner integration contracts.
sources:
- https://www.adm.com
responseCodes:
  throttled: 429
limits:
- name: Per-contract limits
  scope: account
  metric: varies
  limit: see provider integration agreement
  notes: No public rate-limit numbers; throughput is governed by individual customer or partner contracts.
policies:
- name: Backoff Strategy
  description: Clients should implement exponential backoff with jitter and honor any Retry-After header
    that may be returned, even though the provider does not publish formal retry semantics.
- name: Contract-Scoped Limits
  description: Quotas, burst, and concurrency ceilings are governed by the individual customer or partner
    contract rather than a public policy. Coordinate with the provider to confirm thresholds before scaling
    traffic.
